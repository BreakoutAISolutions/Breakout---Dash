<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout AI Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #080c18; }
body { background: #080c18; color: #e8edf5; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(249,115,22,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(249,115,22,0.025) 1px, transparent 1px); background-size: 44px 44px; pointer-events: none; z-index: 0; }
.topnav { position: sticky; top: 0; z-index: 50; background: rgba(8,12,24,0.96); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.07); }
.topnav-inner { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 56px; gap: 12px; }
.brand { display: flex; align-items: center; gap: 8px; }
.brand-icon { width: 30px; height: 30px; border-radius: 7px; background: linear-gradient(135deg,#f97316,#c2410c); display: flex; align-items: center; justify-content: center; }
.brand-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; }
.nav-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #34d399; }
.nav-status::before { content:''; width:6px; height:6px; border-radius:50%; background:#34d399; box-shadow:0 0 7px #34d399; }
.main { position: relative; z-index: 1; }
.pnl { padding: 28px 20px 80px; max-width: 1280px; margin: 0 auto; }
.hero { text-align: center; padding: 10px 0 18px; }
.hero h1 { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; line-height: 1.1; letter-spacing: -1px; }
.gtxt { background: linear-gradient(90deg,#fb923c,#fdba74); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.card { background: #0f1623; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
.row2 { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.row2 > * { flex: 1; min-width: 160px; }
.flabel { display: block; font-size: 11px; color: #8fa3c0; margin-bottom: 5px; }
.inp, .sel, .edit-input { width: 100%; background: #161e30; color: #e8edf5; border: 1px solid rgba(249,115,22,0.22); border-radius: 10px; padding: 10px 12px; font: inherit; outline: none; }
.btn-main, .bsm { border: none; border-radius: 10px; cursor: pointer; font: inherit; }
.btn-main { width: 100%; padding: 13px; background: linear-gradient(135deg,#f97316,#c2410c); color: white; font-family: 'Syne', sans-serif; font-weight: 700; }
.bsm { padding: 8px 12px; background: #161e30; color: #e8edf5; border: 1px solid rgba(255,255,255,0.08); }
.bsm.ok { border-color: rgba(52,211,153,0.3); color: #34d399; background: rgba(52,211,153,0.08); }
.bsm.ora { border-color: rgba(249,115,22,0.35); color: #fb923c; background: rgba(249,115,22,0.08); }
.ebar { display:none; padding: 12px 14px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 10px; color: #fca5a5; margin-bottom: 12px; }
.progress-wrap { display:none; margin-bottom: 14px; background:#0f1623; border:1px solid rgba(249,115,22,0.2); border-radius: 14px; padding: 14px; }
.progress-head { display:flex; justify-content:space-between; gap:12px; font-size:12px; color:#fb923c; margin-bottom:8px; }
.progress-sub { font-size:11px; color:#8fa3c0; margin-bottom:10px; }
.progress-track { width:100%; height:10px; background:#161e30; border-radius:999px; overflow:hidden; }
.progress-fill { height:100%; width:0%; background: linear-gradient(90deg,#fb923c,#fdba74); transition: width .35s ease; }
.summary { display:none; align-items:center; gap:0; background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2); border-radius: 14px; margin-bottom: 14px; overflow: auto; }
.summary-box { flex:1; min-width:120px; text-align:center; padding:12px 8px; }
.summary-box strong { display:block; font-family: 'Syne', sans-serif; font-size: 22px; color:#34d399; }
.summary-box span { display:block; font-size:10px; color:#4a6080; text-transform:uppercase; letter-spacing:.5px; }
.summary-div { width:1px; height:32px; background: rgba(52,211,153,0.18); flex-shrink:0; }
.results-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
.lead-card { background: #0f1623; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 390px; }
.lead-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.lead-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:#e8edf5; line-height:1.2; }
.lead-sub { font-size:11px; color:#8fa3c0; line-height:1.45; margin-top:4px; }
.badges { display:flex; gap:6px; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; padding:4px 8px; border-radius:999px; font-size:10px; font-weight:700; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:#cdd6e6; }
.badge.ok { color:#34d399; border-color:rgba(52,211,153,0.22); background:rgba(52,211,153,0.08); }
.badge.ora { color:#fb923c; border-color:rgba(249,115,22,0.22); background:rgba(249,115,22,0.08); }
.main-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
.block { background: rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 10px; }
.block-label { font-size:9px; text-transform:uppercase; letter-spacing:.8px; color:#4a6080; margin-bottom:4px; }
.block-value { font-size:12px; color:#e8edf5; line-height:1.35; word-break: break-word; }
.secondary-row { display:flex; justify-content:flex-end; gap:10px; margin-top:auto; }
.secondary-pill { min-width:110px; text-align:right; background: rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 10px; }
.secondary-pill .block-value { color:#8fa3c0; }
.action-row { display:flex; gap:8px; flex-wrap:wrap; }
.modal-backdrop { position: fixed; inset: 0; background: rgba(8,12,24,0.86); backdrop-filter: blur(8px); display:none; align-items:center; justify-content:center; z-index:100; padding:16px; }
.modal-backdrop.open { display:flex; }
.modal { width: 100%; max-width: 820px; max-height: 90vh; overflow: auto; background:#0f1623; border:1px solid rgba(249,115,22,0.22); border-radius:18px; padding:20px; }
.modal h3 { font-family:'Syne',sans-serif; margin-bottom:6px; }
.modal-sub { color:#8fa3c0; font-size:13px; margin-bottom:14px; }
.contacts-list { display:grid; gap:8px; margin-top:10px; }
.contact-row { background:#161e30; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:10px; }
@media (max-width: 920px) { .results-grid { grid-template-columns: 1fr; } .main-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="topnav">
  <div class="topnav-inner">
    <div class="brand"><div class="brand-icon">â¡</div><div class="brand-name">Breakout AI</div></div>
    <div class="nav-status">AI Online</div>
  </div>
</div>

<div class="main">
  <div class="pnl">
    <div class="hero">
      <h1>Your Business Runs on<br><span class="gtxt">Autopilot.</span></h1>
    </div>

    <div class="card">
      <div class="row2">
        <div><label class="flabel">Business Type</label><input class="inp" id="searchType" value="HVAC"></div>
        <div><label class="flabel">City</label><input class="inp" id="searchCity" value="Palm Desert CA"></div>
        <div><label class="flabel">Min Rating</label><select class="sel" id="searchRating"><option value="">Any</option><option value="4" selected>4.0+</option><option value="4.5">4.5+</option></select></div>
        <div><label class="flabel">Max Results</label><select class="sel" id="searchLimit"><option value="10">10</option><option value="20" selected>20</option><option value="30">30</option><option value="40">40</option></select></div>
      </div>
      <div class="row2">
        <div><label class="flabel">Custom Cities Optional</label><input class="inp" id="searchCenters" placeholder="Palm Springs CA, La Quinta CA"></div>
      </div>
      <button class="btn-main" id="searchBtn">Search for Leads</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-head"><span id="progressStage">Connecting</span><span id="progressPct">0%</span></div>
      <div class="progress-sub" id="progressSub">Preparing lead search</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="ebar" id="errorBar"></div>

    <div class="summary" id="summaryBar">
      <div class="summary-box"><strong id="sumTotal">0</strong><span>Found</span></div>
      <div class="summary-div"></div>
      <div class="summary-box"><strong id="sumWebsite">0</strong><span>Website</span></div>
      <div class="summary-div"></div>
      <div class="summary-box"><strong id="sumEmail">0</strong><span>Company Email</span></div>
      <div class="summary-div"></div>
      <div class="summary-box"><strong id="sumContacts">0</strong><span>Contacts</span></div>
      <div class="summary-div"></div>
      <div class="summary-box"><strong id="sumAi">0</strong><span>AI Enriched</span></div>
    </div>

    <div class="results-grid" id="resultsGrid"></div>
  </div>
</div>

<div class="modal-backdrop" id="editModalWrap">
  <div class="modal">
    <h3 id="editTitle">Edit Lead</h3>
    <div class="modal-sub">Fix anything before import.</div>
    <div class="row2">
      <div><label class="flabel">Business Name</label><input class="edit-input" id="edit_name"></div>
      <div><label class="flabel">Industry</label><input class="edit-input" id="edit_industry"></div>
    </div>
    <div class="row2">
      <div><label class="flabel">City</label><input class="edit-input" id="edit_city"></div>
      <div><label class="flabel">State</label><input class="edit-input" id="edit_state"></div>
    </div>
    <div class="row2">
      <div><label class="flabel">Business Phone</label><input class="edit-input" id="edit_phone"></div>
      <div><label class="flabel">Website</label><input class="edit-input" id="edit_website"></div>
    </div>
    <div class="row2">
      <div><label class="flabel">Company Email</label><input class="edit-input" id="edit_companyEmail"></div>
      <div><label class="flabel">Primary Contact Name</label><input class="edit-input" id="edit_primaryContactName"></div>
    </div>
    <div class="row2">
      <div><label class="flabel">Primary Contact Title</label><input class="edit-input" id="edit_primaryContactTitle"></div>
      <div><label class="flabel">Primary Contact Email</label><input class="edit-input" id="edit_primaryContactEmail"></div>
    </div>
    <div class="row2">
      <div><label class="flabel">Primary Contact Phone</label><input class="edit-input" id="edit_primaryContactPhone"></div>
      <div><label class="flabel">Revenue</label><input class="edit-input" id="edit_revenue"></div>
    </div>
    <div class="row2">
      <div><label class="flabel">Employees</label><input class="edit-input" id="edit_employees"></div>
    </div>
    <div class="action-row">
      <button class="bsm" id="editCancel">Cancel</button>
      <button class="bsm ok" id="editSave">Save Changes</button>
      <button class="bsm ora" id="editImport">Import</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="contactsModalWrap">
  <div class="modal">
    <h3 id="contactsTitle">Additional Contacts</h3>
    <div class="modal-sub">Public contacts found for this company.</div>
    <div class="contacts-list" id="contactsList"></div>
    <div class="action-row"><button class="bsm" id="contactsClose">Close</button></div>
  </div>
</div>

<script>
const API = 'https://project-creator-BACON8R2026.replit.app';
let leads = [];
let progressTimer = null;
let activeEditIndex = -1;

function esc(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function $(id){ return document.getElementById(id); }
function compact(v){ return String(v || '').trim(); }

function setProgress(pct, stage, sub){
  $('progressPct').textContent = pct + '%';
  $('progressStage').textContent = stage;
  $('progressSub').textContent = sub;
  $('progressFill').style.width = pct + '%';
}

function startProgress(){
  $('errorBar').style.display = 'none';
  $('progressWrap').style.display = 'block';
  const steps = [
    { pct: 8, stage: 'Connecting', sub: 'Preparing Google Places search' },
    { pct: 30, stage: 'Searching Google Places', sub: 'Loading fast business records first' },
    { pct: 56, stage: 'Filling missing fields', sub: 'AI is checking for missing website, email, and contacts' },
    { pct: 82, stage: 'Generating cards', sub: 'Building the lead cards for review' },
    { pct: 96, stage: 'Finalizing', sub: 'Almost done' },
  ];
  let i = 0;
  setProgress(steps[0].pct, steps[0].stage, steps[0].sub);
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    i = Math.min(i + 1, steps.length - 1);
    setProgress(steps[i].pct, steps[i].stage, steps[i].sub);
    if (i === steps.length - 1) clearInterval(progressTimer);
  }, 1200);
}

function finishProgress(ok){
  clearInterval(progressTimer);
  if (ok) {
    setProgress(100, 'Complete', 'Lead search finished');
    setTimeout(() => { $('progressWrap').style.display = 'none'; }, 800);
  } else {
    setProgress(100, 'Failed', 'Lead search stopped before completion');
  }
}

function normalizeLead(item){
  return {
    id: compact(item.id || item.placeId),
    placeId: compact(item.placeId || item.id),
    name: compact(item.name),
    address: compact(item.address),
    city: compact(item.city),
    state: compact(item.state),
    phone: compact(item.phone),
    website: compact(item.website),
    domain: compact(item.domain),
    rating: item.rating || null,
    reviews: item.reviews || '',
    type: compact(item.type),
    source: compact(item.source || 'google'),
    contacts: Array.isArray(item.contacts) ? item.contacts.filter(c => c && (c.name || c.title || c.email || c.phone)) : [],
    primaryContactName: compact(item.primaryContactName),
    primaryContactTitle: compact(item.primaryContactTitle),
    primaryContactEmail: compact(item.primaryContactEmail),
    primaryContactPhone: compact(item.primaryContactPhone),
    companyEmail: compact(item.companyEmail),
    employees: compact(item.employees),
    revenue: compact(item.revenue),
    industry: compact(item.industry),
    serviceArea: compact(item.serviceArea),
    enrichmentSource: compact(item.enrichmentSource),
    enrichmentStatus: compact(item.enrichmentStatus),
    confidence: compact(item.confidence),
    sourceNote: compact(item.sourceNote),
  };
}

function summaryCounts(arr){
  $('sumTotal').textContent = arr.length;
  $('sumWebsite').textContent = arr.filter(x => !!x.website).length;
  $('sumEmail').textContent = arr.filter(x => !!x.companyEmail).length;
  $('sumContacts').textContent = arr.reduce((n, x) => n + (x.contacts ? x.contacts.length : 0), 0);
  $('sumAi').textContent = arr.filter(x => x.enrichmentSource === 'openai').length;
  $('summaryBar').style.display = 'flex';
}

function renderCards(){
  const grid = $('resultsGrid');
  grid.innerHTML = '';
  if (!leads.length) return;

  leads.forEach((lead, index) => {
    const card = document.createElement('div');
    card.className = 'lead-card';

    const contactsLink = lead.contacts.length > 1
      ? '<button class="bsm" onclick="openContacts(' + index + ')">More Contacts (' + lead.contacts.length + ')</button>'
      : '';

    card.innerHTML = `
      <div class="lead-head">
        <div>
          <div class="lead-title">${esc(lead.name)}</div>
          <div class="lead-sub">${esc([lead.city, lead.state].filter(Boolean).join(', ') || lead.address)}</div>
        </div>
        <div class="badges">
          ${lead.rating ? `<span class="badge">â ${esc(lead.rating)}</span>` : ''}
          ${lead.enrichmentSource === 'openai' ? `<span class="badge ok">AI Enriched</span>` : `<span class="badge ora">Google Places</span>`}
        </div>
      </div>

      <div class="main-grid">
        <div class="block">
          <div class="block-label">Industry</div>
          <div class="block-value">${esc(lead.industry || 'Not found')}</div>
        </div>
        <div class="block">
          <div class="block-label">Business Phone</div>
          <div class="block-value">${esc(lead.phone || 'Not found')}</div>
        </div>
        <div class="block">
          <div class="block-label">Website</div>
          <div class="block-value">${lead.website ? `<a href="${esc(lead.website)}" target="_blank" style="color:#fb923c;text-decoration:none">${esc(lead.domain || lead.website)}</a>` : 'Not found'}</div>
        </div>
        <div class="block">
          <div class="block-label">Company Email</div>
          <div class="block-value">${esc(lead.companyEmail || 'Not found')}</div>
        </div>
        <div class="block">
          <div class="block-label">Primary Contact</div>
          <div class="block-value">${esc(lead.primaryContactName || 'Not found')}</div>
          <div class="lead-sub">${esc(lead.primaryContactTitle || '')}</div>
        </div>
        <div class="block">
          <div class="block-label">Primary Contact Email</div>
          <div class="block-value">${esc(lead.primaryContactEmail || lead.primaryContactPhone || 'Not found')}</div>
        </div>
      </div>

      <div class="secondary-row">
        <div class="secondary-pill">
          <div class="block-label">Employees</div>
          <div class="block-value">${esc(lead.employees || 'Optional')}</div>
        </div>
        <div class="secondary-pill">
          <div class="block-label">Revenue</div>
          <div class="block-value">${esc(lead.revenue || 'Optional')}</div>
        </div>
      </div>

      <div class="action-row">
        <button class="bsm" onclick="openEdit(${index})">Edit</button>
        <button class="bsm ok" onclick="importLead(${index})">Import</button>
        ${contactsLink}
      </div>
    `;
    grid.appendChild(card);
  });
}

function openEdit(index){
  activeEditIndex = index;
  const lead = leads[index];
  $('editTitle').textContent = 'Edit Lead: ' + lead.name;
  ['name','industry','city','state','phone','website','companyEmail','primaryContactName','primaryContactTitle','primaryContactEmail','primaryContactPhone','revenue','employees'].forEach(key => {
    $('edit_' + key).value = lead[key] || '';
  });
  $('editModalWrap').classList.add('open');
}

function saveEdit(importAfter){
  if (activeEditIndex < 0) return;
  const lead = leads[activeEditIndex];
  ['name','industry','city','state','phone','website','companyEmail','primaryContactName','primaryContactTitle','primaryContactEmail','primaryContactPhone','revenue','employees'].forEach(key => {
    lead[key] = $('edit_' + key).value.trim();
  });
  if (lead.website && !lead.domain) {
    try { lead.domain = new URL(lead.website).hostname.replace(/^www\./,''); } catch (e) {}
  }
  $('editModalWrap').classList.remove('open');
  renderCards();
  summaryCounts(leads);
  if (importAfter) importLead(activeEditIndex);
}

function openContacts(index){
  const lead = leads[index];
  $('contactsTitle').textContent = 'Additional Contacts: ' + lead.name;
  $('contactsList').innerHTML = lead.contacts.map(c => `
    <div class="contact-row">
      <div style="font-weight:700">${esc(c.name || 'Unnamed')}</div>
      <div style="font-size:12px;color:#fb923c;margin-top:4px">${esc(c.title || '')}</div>
      <div style="font-size:12px;color:#cdd6e6;margin-top:4px">${esc(c.email || '')}</div>
      <div style="font-size:12px;color:#8fa3c0;margin-top:4px">${esc(c.phone || '')}</div>
    </div>
  `).join('');
  $('contactsModalWrap').classList.add('open');
}

function importLead(index){
  const lead = leads[index];
  console.log('Import lead', lead);
  alert('Imported: ' + lead.name);
}

async function runSearch(){
  const type = $('searchType').value.trim();
  const city = $('searchCity').value.trim();
  const minRating = $('searchRating').value;
  const limit = $('searchLimit').value;
  const centers = $('searchCenters').value.trim();

  if (!type || !city) {
    $('errorBar').textContent = 'Enter a business type and city.';
    $('errorBar').style.display = 'block';
    return;
  }

  $('searchBtn').disabled = true;
  $('resultsGrid').innerHTML = '';
  $('summaryBar').style.display = 'none';
  startProgress();

  let url = API + '/api/places/search?query=' + encodeURIComponent(type + ' ' + city);
  if (minRating) url += '&minRating=' + encodeURIComponent(minRating);
  if (limit) url += '&limit=' + encodeURIComponent(limit);
  if (centers) url += '&centers=' + encodeURIComponent(centers);

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    leads = Array.isArray(data.results) ? data.results.map(normalizeLead) : [];
    finishProgress(true);
    renderCards();
    summaryCounts(leads);
  } catch (err) {
    finishProgress(false);
    $('errorBar').textContent = 'Search failed: ' + err.message;
    $('errorBar').style.display = 'block';
  } finally {
    $('searchBtn').disabled = false;
  }
}

$('searchBtn').addEventListener('click', runSearch);
$('editCancel').addEventListener('click', () => $('editModalWrap').classList.remove('open'));
$('editSave').addEventListener('click', () => saveEdit(false));
$('editImport').addEventListener('click', () => saveEdit(true));
$('contactsClose').addEventListener('click', () => $('contactsModalWrap').classList.remove('open'));
</script>
</body>
</html>
