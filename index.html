<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout AI Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #080c18; }
body { background: #080c18 !important; color: #e8edf5; font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(249,115,22,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(249,115,22,0.025) 1px, transparent 1px); background-size: 44px 44px; pointer-events: none; z-index: 0; }
.topnav { position: sticky; top: 0; z-index: 100; background: rgba(8,12,24,0.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.07); }
.topnav-inner { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 56px; gap: 12px; }
.brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.brand-icon { width: 30px; height: 30px; border-radius: 7px; background: linear-gradient(135deg,#f97316,#c2410c); box-shadow: 0 0 14px rgba(249,115,22,0.5); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.brand-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: #e8edf5; }
.nav-scroll { display: flex; align-items: center; gap: 3px; overflow-x: auto; flex: 1; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 0 8px; }
.nav-scroll::-webkit-scrollbar { display: none; }
.ntab { padding: 6px 11px; border-radius: 7px; cursor: pointer; white-space: nowrap; font-size: 12px; font-weight: 500; color: #8fa3c0; border: 1px solid transparent; background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s; flex-shrink: 0; }
.ntab.live { border-color: rgba(52,211,153,0.3); color: #34d399; background: rgba(52,211,153,0.07); }
.nav-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #34d399; flex-shrink: 0; white-space: nowrap; }
.nav-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #34d399; box-shadow: 0 0 7px #34d399; animation: pulse 2s ease infinite; }
.main { background: #080c18; min-height: 100vh; position: relative; z-index: 1; }
.pnl { padding: 32px 28px 80px; max-width: 1180px; margin: 0 auto; background: #080c18; }
.hero { text-align: center; padding: 14px 0 18px; }
.hero h1 { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; letter-spacing: -1.4px; line-height: 1.1; color: #e8edf5; margin-bottom: 8px; }
.gtxt { background: linear-gradient(90deg,#fb923c,#fdba74); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero-badge { display: inline-flex; align-items: center; gap: 7px; padding: 7px 14px; border-radius: 999px; border: 1px solid rgba(249,115,22,0.35); background: rgba(249,115,22,0.12); color: #fb923c; font-size: 12px; margin-bottom: 18px; }
.hero-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #34d399; box-shadow: 0 0 6px #34d399; animation: pulse 2s ease infinite; }
.card { background: #0f1623; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 24px; margin-bottom: 14px; position: relative; overflow: hidden; }
.row2 { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.row2 > * { flex: 1; min-width: 160px; }
.flabel { display: block; font-size: 11px; font-weight: 500; color: #8fa3c0; margin-bottom: 5px; }
.inp, .sel { width: 100%; background: #161e30; border: 1px solid rgba(249,115,22,0.28); border-radius: 9px; padding: 10px 12px; color: #e8edf5; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.btn-main { width: 100%; margin-top: 14px; padding: 13px; background: linear-gradient(135deg,#f97316,#c2410c); border: none; border-radius: 9px; color: #fff; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 18px rgba(249,115,22,0.28); }
.ebar { display: none; padding: 11px 16px; background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.25); border-radius: 9px; margin-bottom: 12px; font-size: 13px; color: #fca5a5; }
.progress-wrap { display:none; margin-bottom: 12px; background:#0f1623; border:1px solid rgba(249,115,22,0.22); border-radius: 12px; padding: 14px; }
.progress-head { display:flex; justify-content:space-between; gap:12px; font-size:12px; color:#fb923c; margin-bottom:8px; }
.progress-sub { font-size:11px; color:#8fa3c0; margin-bottom:10px; }
.progress-track { width:100%; height:10px; background:#161e30; border-radius:999px; overflow:hidden; }
.progress-fill { height:100%; width:0%; background: linear-gradient(90deg,#fb923c,#fdba74); transition: width .35s ease; }
.svbar { display:none; align-items:center; background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2); border-radius: 12px; padding: 12px 0; margin-bottom: 12px; }
.svstat { flex:1; text-align:center; padding:0 10px; }
.svnum { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#34d399; }
.svlbl { font-size:9px; color:#4a6080; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
.svdiv { width:1px; height:30px; background:rgba(52,211,153,0.18); flex-shrink:0; }
.outcard { display:none; background:#0f1623; border:1px solid rgba(255,255,255,0.07); border-radius:14px; overflow:hidden; }
.outhdr { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.07); background:#161e30; gap:10px; flex-wrap:wrap; }
.outtitle { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#34d399; }
.ltbl { width:100%; min-width:1180px; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
.ltbl th, .ltbl td { padding: 14px; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:top; }
.ltbl th { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:#4a6080; background:#161e30; position:sticky; top:0; }
.ltbl td { font-size:12px; color:#8fa3c0; background: rgba(10,16,28,0.92); }
.lname { font-weight:700; color:#e8edf5; display:block; line-height:1.4; }
.lsub { display:block; margin-top:4px; font-size:10px; color:#4a6080; line-height:1.45; }
.lcontact { color:#e8edf5; font-weight:600; display:block; }
.lmuted { color:#4a6080; }
.llink { color:#fb923c; font-size:11px; text-decoration:none; }
.bsm { padding:5px 11px; border-radius:6px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:#8fa3c0; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; }
.bsm.ok { border-color: rgba(52,211,153,0.3); color: #34d399; background: rgba(52,211,153,0.08); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>
<div class="topnav">
  <div class="topnav-inner">
    <div class="brand"><div class="brand-icon">â¡</div><div class="brand-name">Breakout AI</div></div>
    <div class="nav-scroll"><button class="ntab live">Find Leads</button></div>
    <div class="nav-status">AI Online</div>
  </div>
</div>

<div class="main">
  <div class="pnl">
    <div class="hero">
      <h1>Your Business Runs on<br><span class="gtxt">Autopilot.</span></h1>
    </div>
    <div style="text-align:center;margin-bottom:18px"><div class="hero-badge">Breakout AI Internal Ops</div></div>

    <div class="card">
      <div class="row2">
        <div><label class="flabel">Business Type</label><input class="inp" id="ls-q" type="text" value="Attorneys"></div>
        <div><label class="flabel">City</label><input class="inp" id="ls-c" type="text" value="Palm Desert CA"></div>
        <div><label class="flabel">Min Rating</label><select class="sel" id="ls-r"><option value="">Any</option><option value="4" selected>4.0+</option><option value="4.5">4.5+</option></select></div>
        <div><label class="flabel">Max Results</label><select class="sel" id="ls-limit"><option value="20" selected>20</option><option value="40">40</option><option value="60">60</option></select></div>
      </div>
      <div class="row2">
        <div><label class="flabel">Custom Cities Optional</label><input class="inp" id="ls-centers" type="text" placeholder="Palm Springs CA, La Quinta CA"></div>
      </div>
      <button class="btn-main" id="ls-btn" onclick="runSearch()">Search for Leads</button>
    </div>

    <div class="progress-wrap" id="ls-progress">
      <div class="progress-head"><span id="ls-stage">Connecting</span><span id="ls-pct">0%</span></div>
      <div class="progress-sub" id="ls-stage-sub">Preparing lead search</div>
      <div class="progress-track"><div class="progress-fill" id="ls-fill"></div></div>
    </div>

    <div class="ebar" id="ls-eb"></div>

    <div class="svbar" id="ls-sv">
      <div class="svstat"><div class="svnum" id="ls-tot">0</div><div class="svlbl">Found</div></div>
      <div class="svdiv"></div>
      <div class="svstat"><div class="svnum" id="ls-hot">0</div><div class="svlbl">4.5+</div></div>
      <div class="svdiv"></div>
      <div class="svstat"><div class="svnum" id="ls-ph">0</div><div class="svlbl">Company Phone</div></div>
      <div class="svdiv"></div>
      <div class="svstat"><div class="svnum" id="ls-email">0</div><div class="svlbl">Emails</div></div>
      <div class="svdiv"></div>
      <div class="svstat"><div class="svnum" id="ls-emp">0</div><div class="svlbl">Employees</div></div>
    </div>

    <div class="outcard" id="ls-out">
      <div class="outhdr"><div class="outtitle" id="ls-cnt">0 results</div><div><button class="bsm ok" onclick="doCSV()">CSV</button></div></div>
      <div style="max-height:620px; overflow:auto;">
        <table class="ltbl">
          <thead><tr><th>Business</th><th>Location</th><th>Phone</th><th>Industry</th><th>Employees</th><th>Revenue</th><th>Company Email</th><th>Primary Contact</th><th>Website</th></tr></thead>
          <tbody id="ls-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
var API = 'https://project-creator-BACON8R2026.replit.app';
var leads = [];
var progressTimer = null;
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showEl(id){ var el=document.getElementById(id); if(el) el.style.display='block'; }
function showFlex(id){ var el=document.getElementById(id); if(el) el.style.display='flex'; }
function hideEl(id){ var el=document.getElementById(id); if(el) el.style.display='none'; }
function setText(id,val){ var el=document.getElementById(id); if(el) el.textContent=val; }
function get(id){ return document.getElementById(id); }
function compact(v){ return String(v || '').trim(); }
function normalizeLead(item){
  item = item || {};
  return {
    id: compact(item.id || item.placeId),
    name: compact(item.name || item.displayName),
    address: compact(item.address || item.formattedAddress),
    city: compact(item.city),
    state: compact(item.state),
    phone: compact(item.phone),
    website: compact(item.website || item.websiteUri),
    domain: compact(item.domain),
    rating: item.rating || null,
    reviews: item.reviews || '',
    type: compact(item.type),
    industry: compact(item.industry),
    employees: compact(item.employees),
    revenue: compact(item.revenue),
    companyEmail: compact(item.companyEmail),
    linkedin: compact(item.linkedin),
    contacts: Array.isArray(item.contacts) ? item.contacts : [],
    primaryContactName: compact(item.primaryContactName),
    primaryContactTitle: compact(item.primaryContactTitle),
    primaryContactEmail: compact(item.primaryContactEmail),
    primaryContactPhone: compact(item.primaryContactPhone)
  };
}
function updateProgress(pct, stage, sub){
  setText('ls-stage', stage);
  setText('ls-stage-sub', sub);
  setText('ls-pct', pct + '%');
  get('ls-fill').style.width = pct + '%';
}
function startProgress(){
  hideEl('ls-eb');
  showEl('ls-progress');
  var steps = [
    { pct: 8, stage: 'Connecting', sub: 'Preparing lead search' },
    { pct: 25, stage: 'Searching local businesses', sub: 'Querying Google Places across your target area' },
    { pct: 45, stage: 'Expanding nearby cities', sub: 'Running the wider local coverage search' },
    { pct: 68, stage: 'Enriching companies', sub: 'Checking company fields like industry and employees' },
    { pct: 86, stage: 'Scraping websites', sub: 'Looking for email, names, and contact details' },
    { pct: 95, stage: 'Building cards', sub: 'Formatting the final lead results' }
  ];
  var idx = 0;
  updateProgress(steps[0].pct, steps[0].stage, steps[0].sub);
  clearInterval(progressTimer);
  progressTimer = setInterval(function(){
    idx = Math.min(idx + 1, steps.length - 1);
    updateProgress(steps[idx].pct, steps[idx].stage, steps[idx].sub);
    if (idx === steps.length - 1) clearInterval(progressTimer);
  }, 1300);
}
function finishProgress(ok){
  clearInterval(progressTimer);
  if (ok) {
    updateProgress(100, 'Complete', 'Lead search finished');
    setTimeout(function(){ hideEl('ls-progress'); }, 900);
  } else {
    updateProgress(100, 'Failed', 'Lead search stopped before completion');
  }
}
function runSearch(){
  var q = get('ls-q').value.trim();
  var c = get('ls-c').value.trim();
  var r = get('ls-r').value;
  var limit = get('ls-limit').value;
  var centers = get('ls-centers').value.trim();
  if (!q || !c) {
    setText('ls-eb', 'Enter a business type and city.');
    showEl('ls-eb');
    return;
  }
  hideEl('ls-out');
  hideEl('ls-sv');
  get('ls-btn').disabled = true;
  startProgress();
  var url = API + '/api/places/search?query=' + encodeURIComponent(q + ' ' + c);
  if (r) url += '&minRating=' + encodeURIComponent(r);
  if (limit) url += '&limit=' + encodeURIComponent(limit);
  if (centers) url += '&centers=' + encodeURIComponent(centers);
  fetch(url)
    .then(function(res){ if (!res.ok) throw new Error('API ' + res.status); return res.json(); })
    .then(function(data){
      get('ls-btn').disabled = false;
      finishProgress(true);
      var results = Array.isArray(data.results) ? data.results : [];
      leads = results.map(normalizeLead);
      drawLeads(leads);
    })
    .catch(function(err){
      get('ls-btn').disabled = false;
      finishProgress(false);
      setText('ls-eb', 'Search failed: ' + err.message);
      showEl('ls-eb');
    });
}
function drawLeads(arr){
  var tb = get('ls-body');
  tb.innerHTML = '';
  if (!arr.length) {
    tb.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:28px;color:#4a6080">No results found.</td></tr>';
  } else {
    arr.forEach(function(l){
      var tr = document.createElement('tr');
      var location = [l.city, l.state].filter(Boolean).join(', ') || l.address || '';
      var contactBlock = l.primaryContactName
        ? '<span class="lcontact">' + esc(l.primaryContactName) + '</span><span class="lsub">' + esc(l.primaryContactTitle || '') + '</span><span class="lsub">' + esc(l.primaryContactEmail || l.primaryContactPhone || '') + '</span>'
        : '<span class="lmuted">Not found</span>';
      tr.innerHTML =
        '<td><span class="lname">' + esc(l.name) + '</span><span class="lsub">' + esc(l.type || '') + '</span></td>' +
        '<td><span class="lcontact">' + esc(location) + '</span></td>' +
        '<td>' + (l.phone ? '<span class="lcontact">' + esc(l.phone) + '</span>' : '<span class="lmuted">Not found</span>') + '</td>' +
        '<td>' + (l.industry ? '<span class="lcontact">' + esc(l.industry) + '</span>' : '<span class="lmuted">Not found</span>') + '</td>' +
        '<td>' + (l.employees ? '<span class="lcontact">' + esc(l.employees) + '</span>' : '<span class="lmuted">Not found</span>') + '</td>' +
        '<td>' + (l.revenue ? '<span class="lcontact">' + esc(l.revenue) + '</span>' : '<span class="lmuted">Not found</span>') + '</td>' +
        '<td>' + (l.companyEmail ? '<span class="lcontact">' + esc(l.companyEmail) + '</span>' : '<span class="lmuted">Not found</span>') + '</td>' +
        '<td>' + contactBlock + '</td>' +
        '<td>' + (l.website ? '<a class="llink" href="' + esc(l.website) + '" target="_blank" rel="noopener">Visit site â</a>' : '<span class="lmuted">Not found</span>') + '</td>';
      tb.appendChild(tr);
    });
  }
  setText('ls-cnt', arr.length + ' results');
  setText('ls-tot', arr.length);
  setText('ls-hot', arr.filter(function(x){ return (x.rating || 0) >= 4.5; }).length);
  setText('ls-ph', arr.filter(function(x){ return !!x.phone; }).length);
  setText('ls-email', arr.filter(function(x){ return !!x.companyEmail; }).length);
  setText('ls-emp', arr.filter(function(x){ return !!x.employees; }).length);
  showFlex('ls-sv');
  showEl('ls-out');
}
function doCSV(){
  if (!leads.length) return;
  var rows = [['Business Name','City','State','Phone','Industry','Employees','Revenue','Company Email','Primary Contact','Primary Contact Email','Website']];
  leads.forEach(function(l){
    rows.push([l.name || '', l.city || '', l.state || '', l.phone || '', l.industry || '', l.employees || '', l.revenue || '', l.companyEmail || '', l.primaryContactName || '', l.primaryContactEmail || '', l.website || '']);
  });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
  var blob = new Blob([csv], { type:'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'breakout_ai_leads.csv';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
